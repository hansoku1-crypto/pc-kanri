<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC管理ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a}
#app{max-width:1200px;margin:0 auto;padding:1rem}
h1{font-size:18px;font-weight:600;margin-bottom:1rem;color:#1a1a1a}
.filter-card{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1rem;margin-bottom:1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;align-items:end}
.filter-field{display:flex;flex-direction:column;gap:4px}
.filter-field label{font-size:11px;color:#888}
.filter-field input,.filter-field select{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;background:#fff;color:#1a1a1a;outline:none}
.filter-field input:focus,.filter-field select:focus{border-color:#666}
.filter-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;grid-column:1/-1;padding-top:8px;border-top:0.5px solid #eee;margin-top:4px}
.result-count{font-size:12px;color:#888;margin-left:auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem}
.stat{background:#fff;border:0.5px solid #e0e0da;border-radius:8px;padding:.75rem 1rem}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600}
.tbl-wrap{overflow-x:auto;border:0.5px solid #e0e0da;border-radius:12px;background:#fff;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#f8f8f6;padding:8px 10px;text-align:left;font-weight:500;font-size:11px;color:#888;white-space:nowrap;border-bottom:0.5px solid #e0e0da;cursor:pointer;user-select:none}
th:hover{color:#1a1a1a}
td{padding:8px 10px;border-bottom:0.5px solid #f0f0ea;vertical-align:top;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a1a}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.badge-ok{background:#EAF3DE;color:#3B6D11}
.badge-no{background:#F1EFE8;color:#5F5E5A}
.badge-warn{background:#FAEEDA;color:#854F0B}
.row-detail td{padding:12px 16px;white-space:normal;background:#fafafa}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px 20px}
.detail-item label{font-size:11px;color:#888;display:block;margin-bottom:2px}
.detail-item span{font-size:13px;word-break:break-all}
.btn{font-size:12px;padding:5px 12px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{color:#c0392b;border-color:#e0a0a0}
.btn-danger:hover{background:#fdf0f0}
.sort-arrow{font-size:10px;margin-left:2px}
.empty{padding:3rem;text-align:center;color:#888}
.save-ind{font-size:12px;color:#888}
.save-ind.saving{color:#d4800a}
.save-ind.saved{color:#3B6D11}
.save-ind.error{color:#c0392b}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(620px,96vw);max-height:90vh;overflow-y:auto;border:0.5px solid #e0e0da}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;color:#888}
.form-field input,.form-field select,.form-field textarea{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:6px 8px;background:#fff;color:#1a1a1a;outline:none}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:#666}
.form-field textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.loading{padding:3rem;text-align:center;color:#888}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #e0e0da;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <h1>PC管理ツール</h1>

  <div class="filter-card">
    <div class="filter-field">
      <label>フリーワード</label>
      <input type="text" id="f-word" placeholder="製造番号・担当者・店舗..." oninput="render()">
    </div>
    <div class="filter-field">
      <label>メーカー</label>
      <select id="f-maker" onchange="render()"><option value="">すべて</option></select>
    </div>
    <div class="filter-field">
      <label>Office助成金</label>
      <select id="f-office" onchange="render()">
        <option value="">すべて</option>
        <option value="◯">◯ あり</option>
        <option value="ー">ー なし</option>
        <option value="none">未設定</option>
      </select>
    </div>
    <div class="filter-field">
      <label>受渡日付（開始）</label>
      <input type="month" id="f-date-from" oninput="render()">
    </div>
    <div class="filter-field">
      <label>受渡日付（終了）</label>
      <input type="month" id="f-date-to" oninput="render()">
    </div>
    <div class="filter-field">
      <label>状態</label>
      <select id="f-status" onchange="render()">
        <option value="">すべて</option>
        <option value="normal">正常</option>
        <option value="broken">故障</option>
        <option value="repair">修理中</option>
        <option value="discard">廃棄</option>
      </select>
    </div>
    <div class="filter-actions">
      <button class="btn" onclick="resetFilters()">リセット</button>
      <button class="btn" onclick="openAdd()">＋ 新規登録</button>
      <button class="btn" onclick="loadData()" title="スプレッドシートから再読み込み">↺ 再読み込み</button>
      <span class="save-ind" id="save-ind"></span>
      <span class="result-count" id="result-count"></span>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:32px"></th>
        <th style="width:110px" onclick="setSort('makerNorm')">メーカー<span class="sort-arrow" id="s-makerNorm"></span></th>
        <th style="width:140px" onclick="setSort('製造番号')">製造番号<span class="sort-arrow" id="s-製造番号"></span></th>
        <th style="width:90px" onclick="setSort('受渡日付')">受渡日付<span class="sort-arrow" id="s-受渡日付"></span></th>
        <th style="width:90px">PC名</th>
        <th onclick="setSort('担当者・店舗')">担当者・店舗<span class="sort-arrow" id="s-担当者・店舗"></span></th>
        <th style="width:80px">Office</th>
        <th style="width:70px">操作</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby11ubaJ5zmNlNvP_iXxQofudIlkbtaugltwSdgfqBq3sEkcs5eWUf6ukFo8V6eHUqU/exec';
const HEADERS = ['メーカー','製造番号','受渡日付','PC名','担当者・店舗','Office助成金','Officeアカウント','Officeパス','Microsoftアカウント','Microsoftパス','PIN','メモ','Office追加日'];

let data = [], sortKey = '受渡日付', sortDir = -1, expanded = new Set();

function normMaker(s) {
  if (!s) return '';
  const t = s.trim().toUpperCase();
  if (t.startsWith('LENOVO')) return 'Lenovo';
  if (t.startsWith('DELL')) return 'DELL';
  if (t.startsWith('HP')) return 'HP';
  if (t.includes('マウス') || t.includes('MOUSE')) return 'マウスコンピュータ';
  return s.trim();
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function normDate(s) {
  if (!s) return '';
  const d = s.trim();
  if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(d)) { const p = d.split('/'); return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`; }
  if (/^\d{8}$/.test(d)) return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
  return d;
}

function getStatus(r) {
  const u = (r['担当者・店舗'] || '') + ' ' + (r['メモ'] || '');
  if (/破棄|処分/.test(u)) return 'discard';
  if (/修理/.test(u)) return 'repair';
  if (/故障|初期不良/.test(u)) return 'broken';
  return 'normal';
}

function showInd(state, msg) {
  const el = document.getElementById('save-ind');
  el.className = 'save-ind ' + state;
  el.textContent = msg || '';
}

async function loadData() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="loading"><span class="spinner"></span>スプレッドシートから読み込み中...</td></tr>';
  showInd('saving', '読み込み中...');
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    data = json.map((r, i) => ({ _id: i, ...r, makerNorm: normMaker(r['メーカー']) }));
    showInd('saved', '読み込み完了');
    setTimeout(() => showInd('', ''), 2000);
    initMakerFilter();
    render();
  } catch (e) {
    showInd('error', 'エラー: ' + e.message);
    document.getElementById('tbody').innerHTML = `<tr><td colspan="8" class="empty">読み込みに失敗しました: ${esc(e.message)}</td></tr>`;
  }
}

async function saveData() {
  showInd('saving', '保存中...');
  try {
    const payload = data.map(r => {
      const rec = {};
      HEADERS.forEach(h => { rec[h] = r[h] || ''; });
      return rec;
    });
    const res = await fetch(GAS_URL + '?action=save&data=' + encodeURIComponent(JSON.stringify(payload)));
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    showInd('saved', `保存済み ✓ (${json.saved}件)`);
    setTimeout(() => showInd('', ''), 3000);
  } catch (e) {
    showInd('error', '保存エラー: ' + e.message);
  }
}

function initMakerFilter() {
  const mf = document.getElementById('f-maker');
  const cur = mf.value;
  while (mf.options.length > 1) mf.remove(1);
  [...new Set(data.map(r => r.makerNorm).filter(Boolean))].sort().forEach(m => {
    const o = document.createElement('option'); o.value = m; o.textContent = m;
    if (m === cur) o.selected = true; mf.appendChild(o);
  });
}

function resetFilters() {
  ['f-word','f-date-from','f-date-to'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  ['f-maker','f-office','f-status'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  render();
}

function setSort(k) { if (sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=-1; } render(); }

function statusBadge(r) {
  const st = getStatus(r);
  if (st==='broken') return '<span class="badge badge-warn">故障</span>';
  if (st==='discard') return '<span class="badge badge-no">廃棄</span>';
  if (st==='repair') return '<span class="badge badge-warn">修理中</span>';
  return '';
}
function officeBadge(v) {
  if (v==='◯') return '<span class="badge badge-ok">◯ あり</span>';
  if (v==='ー') return '<span class="badge badge-no">ー なし</span>';
  return '<span class="badge badge-no">未設定</span>';
}

function getFiltered() {
  const q = (document.getElementById('f-word')||{value:''}).value.toLowerCase();
  const mk = (document.getElementById('f-maker')||{value:''}).value;
  const of = (document.getElementById('f-office')||{value:''}).value;
  const df = (document.getElementById('f-date-from')||{value:''}).value;
  const dt = (document.getElementById('f-date-to')||{value:''}).value;
  const st = (document.getElementById('f-status')||{value:''}).value;
  return data.filter(r => {
    if (q && !(([r['メーカー'],r['製造番号'],r['担当者・店舗'],r['PC名'],r['Microsoftアカウント'],r['Officeアカウント'],r['メモ']].join('')).toLowerCase().includes(q))) return false;
    if (mk && r.makerNorm !== mk) return false;
    if (of) { if (of==='none'&&r['Office助成金']) return false; if (of!=='none'&&r['Office助成金']!==of) return false; }
    if (st && getStatus(r) !== st) return false;
    if (df || dt) {
      const nd = normDate(r['受渡日付']); const ym = nd.substring(0, 7);
      if (!ym) return !(df||dt);
      if (df && ym < df) return false;
      if (dt && ym > dt) return false;
    }
    return true;
  }).sort((a, b) => {
    const va = a[sortKey] || '', vb = b[sortKey] || '';
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });
}

function render() {
  const rows = getFiltered();
  const total = data.length;
  const withOffice = data.filter(r => r['Office助成金']==='◯').length;
  const broken = data.filter(r => ['broken','repair'].includes(getStatus(r))).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">総台数</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">助成金Office</div><div class="stat-val">${withOffice}</div></div>
    <div class="stat"><div class="stat-label">故障・修理中</div><div class="stat-val">${broken}</div></div>
    <div class="stat"><div class="stat-label">表示中</div><div class="stat-val">${rows.length}</div></div>`;
  document.getElementById('result-count').textContent = rows.length < total ? `${total}件中 ${rows.length}件` : '';
  const sortKeys = ['makerNorm','製造番号','受渡日付','担当者・店舗'];
  sortKeys.forEach(k => { const el = document.getElementById('s-'+k); if(el) el.textContent = sortKey===k ? (sortDir>0?'▲':'▼') : ''; });

  const tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="8" class="empty">該当するPCが見つかりません</td></tr>`; return; }

  tbody.innerHTML = rows.map(r => {
    const badge = statusBadge(r);
    const detail = expanded.has(r._id) ? `<tr class="row-detail"><td colspan="8">
      <div class="detail-grid">
        ${HEADERS.map(h => `<div class="detail-item"><label>${esc(h)}</label><span>${esc(r[h])||'—'}</span></div>`).join('')}
      </div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn" onclick="openEdit(${r._id});event.stopPropagation()">編集</button>
        <button class="btn btn-danger" onclick="confirmDelete(${r._id});event.stopPropagation()">削除</button>
        <button class="btn" onclick="toggleRow(${r._id});event.stopPropagation()">閉じる</button>
      </div>
    </td></tr>` : '';
    return `<tr onclick="toggleRow(${r._id})" style="cursor:pointer">
      <td style="text-align:center">${expanded.has(r._id)?'▾':'▸'}</td>
      <td>${esc(r.makerNorm)||'—'}</td>
      <td style="font-family:monospace;font-size:12px">${esc((r['製造番号']||'—').substring(0,22))}</td>
      <td style="font-size:12px">${esc(r['受渡日付'])||'—'}</td>
      <td style="font-size:12px">${esc(r['PC名'])||'—'}</td>
      <td>${esc((r['担当者・店舗']||'—').substring(0,30))}${badge?' '+badge:''}</td>
      <td>${officeBadge(r['Office助成金'])}</td>
      <td onclick="event.stopPropagation()"><button class="btn" onclick="openEdit(${r._id})">編集</button></td>
    </tr>${detail}`;
  }).join('');
}

function toggleRow(id) { if(expanded.has(id)) expanded.delete(id); else expanded.add(id); render(); }

function openEdit(id) { const r = data.find(x => x._id===id); if(r) showModal(r, false); }
function openAdd() { showModal({ _id: Date.now() }, true); }

function showModal(r, isNew) {
  document.getElementById('modal-content').innerHTML = `
    <h2>${isNew ? '新規PC登録' : 'PC情報を編集'}</h2>
    <div class="form-grid">
      ${HEADERS.map(h => {
        const isLong = ['担当者・店舗','Officeアカウント','Microsoftアカウント','メモ'].includes(h);
        const isSelect = h === 'Office助成金';
        const val = esc(r[h] || '');
        if (isSelect) return `<div class="form-field"><label>${esc(h)}</label><select id="fm-${esc(h)}"><option value="">未設定</option><option value="◯"${r[h]==='◯'?' selected':''}>◯ あり</option><option value="ー"${r[h]==='ー'?' selected':''}>ー なし</option></select></div>`;
        if (isLong) return `<div class="form-field full"><label>${esc(h)}</label><input id="fm-${esc(h)}" value="${val}"></div>`;
        return `<div class="form-field"><label>${esc(h)}</label><input id="fm-${esc(h)}" value="${val}"></div>`;
      }).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRecord(${r._id}, ${isNew})">保存してスプレッドシートに反映</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function onOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

async function saveRecord(id, isNew) {
  const rec = { _id: id };
  HEADERS.forEach(h => { const el = document.getElementById('fm-' + h); rec[h] = el ? el.value : ''; });
  rec.makerNorm = normMaker(rec['メーカー']);
  if (isNew) { data.push(rec); }
  else { const i = data.findIndex(x => x._id===id); if(i>=0) data[i]=rec; }
  closeModal(); initMakerFilter(); render();
  await saveData();
}

function confirmDelete(id) {
  const r = data.find(x => x._id===id); if(!r) return;
  document.getElementById('modal-content').innerHTML = `
    <h2>削除の確認</h2>
    <p style="font-size:14px;margin-bottom:.75rem;color:#888">以下のPCを削除します。スプレッドシートからも削除されます。</p>
    <p style="font-size:14px;font-weight:600;margin-bottom:1.5rem">${esc(r.makerNorm)||'—'} / ${esc(r['製造番号'])||'—'} — ${esc(r['担当者・店舗'])||'—'}</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger" onclick="deleteRecord(${id})">削除する</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function deleteRecord(id) {
  data = data.filter(x => x._id !== id); expanded.delete(id);
  closeModal(); render();
  await saveData();
}

// 起動時に読み込み
loadData();
</script>
</body>
</html>
