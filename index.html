<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PC管理ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a}
#app{max-width:1300px;margin:0 auto;padding:1rem}

.nav{display:flex;gap:8px;margin-bottom:1rem;border-bottom:1px solid #e0e0da;padding-bottom:.75rem;align-items:center;flex-wrap:wrap}
.nav h1{font-size:16px;font-weight:700;margin-right:8px}
.tab{font-size:13px;padding:5px 14px;border:0.5px solid #d0d0ca;border-radius:20px;background:#fff;cursor:pointer;color:#555}
.tab:hover{background:#f0f0ea}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}

.filter-card{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1rem;margin-bottom:1rem}
.filter-row1{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.filter-row2{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-top:8px;border-top:0.5px solid #eee}
.filter-search{flex:1;min-width:200px;max-width:320px;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none}
.filter-search:focus{border-color:#666}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:11px;color:#888}
.ff input,.ff select{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
.ff input:focus,.ff select:focus{border-color:#666}
.filter-btn{font-size:12px;padding:5px 12px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.filter-btn:hover{background:#f5f5f3}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.filter-btn .filter-val{font-size:11px;opacity:.8}
.date-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center}
.date-modal-bg.open{display:flex}
.date-modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(480px,96vw);border:0.5px solid #e0e0da}
.date-modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.date-range-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-range-row input{flex:1;min-width:120px;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:6px 8px;outline:none}
.date-range-sep{color:#aaa;font-size:13px}
.date-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:0.5px solid #eee}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:11px;color:#888}
.ff input,.ff select{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
.ff input:focus,.ff select:focus{border-color:#666}
.filter-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;grid-column:1/-1;padding-top:8px;border-top:0.5px solid #eee;margin-top:2px}
.rc{font-size:12px;color:#888;margin-left:auto}

.stats{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.stat{background:#fff;border:0.5px solid #e0e0da;border-radius:8px;padding:.5rem .9rem;display:flex;align-items:center;gap:6px}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-label{font-size:12px;color:#666}
.stat-val{font-size:16px;font-weight:700;margin-left:2px}

.tbl-wrap{overflow-x:auto;border:0.5px solid #e0e0da;border-radius:12px;background:#fff;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#f8f8f6;padding:8px 10px;text-align:left;font-weight:500;font-size:11px;color:#888;white-space:nowrap;border-bottom:0.5px solid #e0e0da;cursor:pointer;user-select:none}
th:hover{color:#1a1a1a}
td{padding:8px 10px;border-bottom:0.5px solid #f0f0ea;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.row-detail td{padding:12px 16px;white-space:normal;background:#fafafa;border-bottom:0.5px solid #e8e8e4}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px 24px;margin-bottom:12px}
.di label{font-size:11px;color:#888;display:block;margin-bottom:2px}
.di span{font-size:13px;word-break:break-all}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500}
.badge-dot{width:6px;height:6px;border-radius:50%}
.s-active{background:#E8F5E9;color:#2E7D32}
.s-scheduled{background:#E3F2FD;color:#1565C0}
.s-stock{background:#F3E5F5;color:#6A1B9A}
.s-prep{background:#FFF8E1;color:#F57F17}
.s-disposed{background:#EFEBE9;color:#4E342E}
.s-unknown{background:#FFEBEE;color:#B71C1C}
.task-lend{background:#FFF3E0;color:#E65100}
.task-return{background:#E8F5E9;color:#2E7D32}

.btn{font-size:12px;padding:5px 12px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;white-space:nowrap}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{color:#c0392b;border-color:#e0a0a0}
.btn-danger:hover{background:#fdf0f0}
.btn-sm{font-size:11px;padding:3px 9px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(700px,96vw);margin-bottom:40px;border:0.5px solid #e0e0da}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;color:#888}
.form-field input,.form-field select,.form-field textarea{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:6px 8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
.form-field textarea{resize:vertical;min-height:56px}
.form-section{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;grid-column:1/-1;margin-top:8px;padding-top:8px;border-top:0.5px solid #eee}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #eee}

/* 部署・役職マスタ共通 */
.master-panel{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.master-panel h3{font-size:14px;font-weight:600;margin-bottom:.75rem}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
/* 部署フラットリスト */
.dept-list{border:0.5px solid #e0e0da;border-radius:8px;overflow:hidden;margin-bottom:1rem}
.dept-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:8px 12px;border-bottom:0.5px solid #f0f0ea;background:#fff}
.dept-row:last-child{border-bottom:none}
.dept-row:hover{background:#fafafa}
.dept-name-cell{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;min-width:0}
.dept-level-line{flex-shrink:0;color:#ddd;font-size:12px}
.dept-parent-sel{font-size:12px;border:0.5px solid #d0d0ca;border-radius:5px;padding:3px 8px;background:#fff;color:#555;outline:none;max-width:180px;cursor:pointer}
.dept-parent-sel:focus{border-color:#888}
.dept-level-badge{font-size:10px;padding:2px 7px;border-radius:8px;background:#f0f0ea;color:#888;white-space:nowrap}
.dept-empty{padding:2rem;text-align:center;font-size:13px;color:#aaa}
.ctx-menu-wrap{position:relative;flex-shrink:0}
.ctx-btn{font-size:16px;width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:#aaa;border-radius:5px;display:flex;align-items:center;justify-content:center;line-height:1}
.ctx-btn:hover{background:#f0f0ea;color:#555}
.ctx-menu{display:none;position:fixed;background:#fff;border:0.5px solid #e0e0da;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:160px;z-index:1000;overflow:hidden}
.ctx-menu.open{display:block}
.ctx-menu-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;cursor:pointer;color:#1a1a1a;white-space:nowrap}
.ctx-menu-item:hover{background:#f5f5f3}
.ctx-menu-item.danger{color:#c0392b}
.ctx-menu-item.danger:hover{background:#fdf0f0}
.ctx-menu-sep{height:0.5px;background:#eee;margin:2px 0}

.add-form{background:#f8f8f6;border-radius:8px;padding:1rem;margin-top:.5rem}
.add-form h4{font-size:12px;font-weight:600;color:#888;margin-bottom:.75rem}
.add-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.add-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px}
.add-field label{font-size:11px;color:#888}
.add-field input,.add-field select{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none;background:#fff;color:#1a1a1a;width:100%}

.master-list{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem;max-height:300px;overflow-y:auto}
.master-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fafafa;border-radius:6px;border:0.5px solid #eee}
.master-item span{flex:1;font-size:13px}
.master-add{display:flex;gap:8px;margin-top:4px}
.master-add input{flex:1;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none}

.loading{padding:3rem;text-align:center;color:#888}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e0e0da;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.save-ind{font-size:12px;color:#888}
.save-ind.saving{color:#d4800a}
.save-ind.saved{color:#3B6D11}
.save-ind.error{color:#c0392b}
.sort-arrow{font-size:10px;margin-left:2px}
.empty{padding:3rem;text-align:center;color:#888}
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <h1>PC管理ツール</h1>
    <button class="tab active" onclick="showTab('list')">ハードウェア</button>
    <button class="tab" onclick="showTab('dept')">部署マスタ</button>
    <button class="tab" onclick="showTab('pos')">役職マスタ</button>
    <div class="nav-right">
      <button class="btn" onclick="loadAll()">↺ 再読み込み</button>
      <span class="save-ind" id="save-ind"></span>
    </div>
  </div>

  <!-- ハードウェア一覧 -->
  <div id="tab-list">
    <div class="filter-card">
      <div class="filter-row1">
        <input type="text" class="filter-search" id="f-word" placeholder="シリアル番号・ID・ユーザー..." oninput="render()">
        <select id="f-status" class="filter-btn" onchange="render()" style="min-width:110px">
          <option value="">ステータス: すべて</option>
          <option>利用中</option><option>利用予定</option><option>在庫</option>
          <option>準備中</option><option>廃棄・解約</option><option>所在不明</option>
        </select>
        <select id="f-dept" class="filter-btn" onchange="render()" style="min-width:110px"><option value="">部署: すべて</option></select>
        <select id="f-task" class="filter-btn" onchange="render()" style="min-width:120px"><option value="">管理者のタスク: すべて</option></select>
        <select id="f-procurement" class="filter-btn" onchange="render()" style="min-width:110px"><option value="">調達方法: すべて</option></select>
        <select id="f-maker" class="filter-btn" onchange="render()" style="min-width:110px"><option value="">メーカー: すべて</option></select>
      </div>
      <div class="filter-row2">
        <button class="filter-btn" id="btn-start" onclick="openDateModal('start')">
          利用開始日 <span class="filter-val" id="lbl-start"></span>
        </button>
        <button class="filter-btn" id="btn-buy" onclick="openDateModal('buy')">
          購入/契約開始日 <span class="filter-val" id="lbl-buy"></span>
        </button>
        <button class="filter-btn" id="btn-renew" onclick="openDateModal('renew')">
          契約更新日 <span class="filter-val" id="lbl-renew"></span>
        </button>
        <button class="btn" onclick="resetFilters()">リセット</button>
        <button class="btn btn-primary" onclick="openAdd()">＋ 新規登録</button>
        <span class="rc" id="result-count"></span>
      </div>
    </div>

    <!-- 日付モーダル -->
    <div class="date-modal-bg" id="date-modal-bg" onclick="closeDateModal(event)">
      <div class="date-modal">
        <h3 id="date-modal-title">利用開始日で絞り込み</h3>
        <div class="date-range-row">
          <input type="date" id="dm-from" placeholder="開始日">
          <span class="date-range-sep">〜</span>
          <input type="date" id="dm-to" placeholder="終了日">
        </div>
        <div class="date-modal-actions">
          <button class="btn" onclick="clearDateFilter()">クリア</button>
          <button class="btn" onclick="document.getElementById('date-modal-bg').classList.remove('open')">キャンセル</button>
          <button class="btn btn-primary" onclick="applyDateFilter()">絞り込み結果を表示</button>
        </div>
      </div>
    </div>

    <!-- 非表示の日付値保持 -->
    <input type="hidden" id="f-start-from"><input type="hidden" id="f-start-to">
    <input type="hidden" id="f-buy-from"><input type="hidden" id="f-buy-to">
    <input type="hidden" id="f-renew-from"><input type="hidden" id="f-renew-to">
    <div class="stats" id="stats"></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:32px"></th>
          <th style="width:130px" onclick="setSort('シリアル番号')">シリアル番号<span class="sort-arrow" id="s-シリアル番号"></span></th>
          <th style="width:110px" onclick="setSort('ID(PC名)')">ID(PC名)<span class="sort-arrow" id="s-ID(PC名)"></span></th>
          <th style="width:90px" onclick="setSort('ステータス')">ステータス<span class="sort-arrow" id="s-ステータス"></span></th>
          <th onclick="setSort('ユーザー')">ユーザー<span class="sort-arrow" id="s-ユーザー"></span></th>
          <th style="width:130px" onclick="setSort('部署')">部署<span class="sort-arrow" id="s-部署"></span></th>
          <th style="width:80px" onclick="setSort('管理者のタスク')">タスク<span class="sort-arrow" id="s-管理者のタスク"></span></th>
          <th style="width:90px" onclick="setSort('利用開始日')">利用開始日<span class="sort-arrow" id="s-利用開始日"></span></th>
          <th style="width:80px">メーカー</th>
          <th style="width:70px">操作</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- 部署マスタ -->
  <div id="tab-dept" style="display:none">
    <div class="master-panel">
      <div class="section-header">
        <h3>部署マスタ（3階層対応）</h3>
        <button class="btn btn-primary btn-sm" onclick="saveDeptMaster()">スプレッドシートに保存</button>
      </div>
      <p style="font-size:12px;color:#aaa;margin-bottom:.75rem">「親部署」欄を変更すると階層を移動できます。変更後は「スプレッドシートに保存」を押してください。</p>
      <div id="dept-list" class="dept-list"></div>
      <div class="add-form">
        <h4>部署を追加</h4>
        <div class="add-row">
          <div class="add-field"><label>部署名</label><input type="text" id="dept-new-name" placeholder="例：串カツ田中立川店"></div>
          <div class="add-field"><label>親部署（任意）</label><select id="dept-new-parent"><option value="">なし（最上位）</option></select></div>
          <button class="btn btn-primary" onclick="addDept()" style="flex-shrink:0">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 役職マスタ -->
  <div id="tab-pos" style="display:none">
    <div class="master-panel">
      <div class="section-header"><h3>役職マスタ</h3><button class="btn btn-primary btn-sm" onclick="savePosMaster()">スプレッドシートに保存</button></div>
      <div class="master-list" id="pos-list"></div>
      <div class="master-add">
        <input type="text" id="pos-new" placeholder="新しい役職名を入力...">
        <button class="btn" onclick="addPosition()">追加</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycby11ubaJ5zmNlNvP_iXxQofudIlkbtaugltwSdgfqBq3sEkcs5eWUf6ukFo8V6eHUqU/exec';
const DEFAULT_TASKS=['貸出','返却','なし'];
const DEFAULT_PROCUREMENT=['購入','リース契約','レンタル'];
const STATUS_LIST=['利用中','利用予定','在庫','準備中','廃棄・解約','所在不明'];
const STATUS_CLASS={'利用中':'s-active','利用予定':'s-scheduled','在庫':'s-stock','準備中':'s-prep','廃棄・解約':'s-disposed','所在不明':'s-unknown'};
const STATUS_COLOR={'利用中':'#4CAF50','利用予定':'#2196F3','在庫':'#9C27B0','準備中':'#FF9800','廃棄・解約':'#795548','所在不明':'#F44336'};

let pcData=[], depts=[], positions=[];
let taskOptions=[...DEFAULT_TASKS], procOptions=[...DEFAULT_PROCUREMENT];
let sortKey='利用開始日', sortDir=-1, expanded=new Set(), treeOpen=new Set();

// ── ドラッグ状態 ──
let dragName=null, dragOverName=null, dragOverMode=null;
// mode: 'top'|'child'|'bottom'
// ★ ドラッグはハンドル(☰)のみから開始。tree-nodeのdraggableは使わない。

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// 任意フォーマット → YYYY/MM/DD 表示用
function toDisplay(s){
  if(!s)return'';
  const d=s.trim();
  // 20220610 → 2022/06/10
  if(/^\d{8}$/.test(d))return`${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
  // 2022-06-10 → 2022/06/10
  if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d.replace(/-/g,'/');
  // 2022/6/10 → 2022/06/10
  if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(d)){const p=d.split('/');return`${p[0]}/${p[1].padStart(2,'0')}/${p[2].padStart(2,'0')}`;}
  return d;
}
// YYYY/MM/DD → YYYY-MM-DD (input[type=date]用)
function toInputDate(s){return toDisplay(s).replace(/\//g,'-');}
// フィルター比較用 YYYY-MM
function normDate(s){return toInputDate(s).substring(0,7);}
function normMaker(s){if(!s)return'';const t=s.trim().toUpperCase();if(t.startsWith('LENOVO'))return'Lenovo';if(t.startsWith('DELL'))return'DELL';if(t.startsWith('HP'))return'HP';if(t.includes('マウス')||t.includes('MOUSE'))return'マウスコンピュータ';return s.trim();}
function showInd(state,msg){const el=document.getElementById('save-ind');el.className='save-ind '+state;el.textContent=msg||'';if(state==='saved')setTimeout(()=>{el.textContent='';el.className='save-ind';},3000);}
function v(id){const el=document.getElementById(id);return el?el.value:'';}

function showTab(name){
  ['list','dept','pos'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'':'none';});
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['list','dept','pos'][i]===name);});
}

async function gasGet(action){const res=await fetch(GAS_URL+'?action='+action);return res.json();}
async function gasPost(action, data) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, data }),
  });
  return res.json();
}

async function loadAll(){
  showInd('saving','読み込み中...');
  document.getElementById('tbody').innerHTML='<tr><td colspan="10" class="loading"><span class="spinner"></span>読み込み中...</td></tr>';
  try{
    const [pc,dept,pos]=await Promise.all([gasGet('getAll'),gasGet('getDepts'),gasGet('getPositions')]);
    if(pc.error)throw new Error(pc.error);
    pcData=(Array.isArray(pc)?pc:[]).map((r,i)=>({_id:i,...r,_makerNorm:normMaker(r['メーカー'])}));
    depts=Array.isArray(dept)?dept:[];
    positions=Array.isArray(pos)?pos:[];
    const allTasks=new Set([...DEFAULT_TASKS,...pcData.map(r=>r['管理者のタスク']).filter(Boolean)]);
    const allProc=new Set([...DEFAULT_PROCUREMENT,...pcData.map(r=>r['調達方法']).filter(Boolean)]);
    taskOptions=[...allTasks]; procOptions=[...allProc];
    initFilters(); renderDeptList(); renderPosList(); render();
    showInd('saved','読み込み完了');
  }catch(e){showInd('error','エラー: '+e.message);}
}

// ── 部署マスタ ──

function buildTree(items){
  const map={}, roots=[];
  items.forEach(d=>{map[d.name]={...d,children:[]};});
  items.forEach(d=>{
    if(d.parent&&map[d.parent])map[d.parent].children.push(map[d.name]);
    else roots.push(map[d.name]);
  });
  return roots;
}

function flatDeptOptions(tree,depth=0){
  const opts=[];
  tree.forEach(node=>{
    opts.push({value:node.name,label:'　'.repeat(depth)+node.name});
    if(node.children.length)opts.push(...flatDeptOptions(node.children,depth+1));
  });
  return opts;
}

function treeToFlat(nodes,parent=''){
  const result=[];
  nodes.forEach(node=>{
    result.push({name:node.name,parent});
    if(node.children.length)result.push(...treeToFlat(node.children,node.name));
  });
  return result;
}

// 各部署の深さを返す
function getDeptDepth(name){
  let d=depts.find(x=>x.name===name);
  let depth=0;
  while(d&&d.parent){
    depth++;
    d=depts.find(x=>x.name===d.parent);
    if(depth>10)break; // 循環防止
  }
  return depth;
}

function renderDeptList(){
  const listEl=document.getElementById('dept-list');
  if(!listEl)return;
  if(!depts.length){
    listEl.innerHTML='<div class="dept-empty">まだ登録されていません。下のフォームから追加してください。</div>';
    updateDeptParentSelect(); return;
  }
  // ツリー順にソートして表示
  const ordered=treeToFlat(buildTree(depts));
  const allOpts=flatDeptOptions(buildTree(depts));

  listEl.innerHTML=ordered.map(d=>{
    const depth=getDeptDepth(d.name);
    const levelColors=['','#9C27B0','#2196F3'];
    const levelLabels=['L1 最上位','L2 中階層','L3 末端'];
    const badge=`<span class="dept-level-badge" style="background:${depth===0?'#f0f0ea':depth===1?'#F3E5F5':'#E3F2FD'};color:${depth===0?'#888':depth===1?'#6A1B9A':'#1565C0'}">${levelLabels[Math.min(depth,2)]}</span>`;
    const indent='　'.repeat(depth);
    // 自分自身と子孫は親として選べない
    const validParentOpts=allOpts.filter(o=>o.value!==d.name&&!isDescendant(d.name,o.value));
    const selOpts='<option value="">なし（最上位）</option>'+validParentOpts.map(o=>`<option value="${esc(o.value)}"${d.parent===o.value?' selected':''}>${esc(o.label)}</option>`).join('');
    const menuId = 'ctx-' + d.name.replace(/[^a-zA-Z0-9]/g,'_') + '_' + Math.random().toString(36).slice(2,6);
    return `<div class="dept-row">
      <div class="dept-name-cell"><span style="color:#ddd;margin-right:2px">${'─'.repeat(depth)}</span><span>${esc(d.name)}</span></div>
      ${badge}
      <select class="dept-parent-sel" onchange="changeDeptParent('${esc(d.name)}',this.value)">${selOpts}</select>
      <div class="ctx-menu-wrap">
        <button class="ctx-btn" onclick="toggleCtxMenu(event,'${esc(menuId)}')">⋯</button>
        <div class="ctx-menu" id="${esc(menuId)}">
          <div class="ctx-menu-item" onclick="renameDept('${esc(d.name)}');closeAllCtxMenus()">
            <span>✏</span> 部署名を変更
          </div>
          <div class="ctx-menu-sep"></div>
          <div class="ctx-menu-item danger" onclick="removeDept('${esc(d.name)}');closeAllCtxMenus()">
            <span>🗑</span> 部署を削除
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  updateDeptParentSelect();
}

// nameがtargetの子孫かチェック
function isDescendant(ancestorName, targetName){
  let cur=depts.find(d=>d.name===targetName);
  let count=0;
  while(cur&&cur.parent){
    if(cur.parent===ancestorName)return true;
    cur=depts.find(d=>d.name===cur.parent);
    if(++count>20)break;
  }
  return false;
}

function changeDeptParent(name, newParent){
  const item=depts.find(d=>d.name===name);
  if(item){ item.parent=newParent; renderDeptList(); initFilters(); }
}

function updateDeptParentSelect(){
  const sel=document.getElementById('dept-new-parent');
  if(!sel)return;
  const cur=sel.value;
  while(sel.options.length>1)sel.remove(1);
  flatDeptOptions(buildTree(depts)).forEach(({value,label})=>{
    const o=document.createElement('option');o.value=value;o.textContent=label;
    if(value===cur)o.selected=true;sel.appendChild(o);
  });
}

function addDept(){
  const name=document.getElementById('dept-new-name').value.trim();
  const parent=document.getElementById('dept-new-parent').value;
  if(!name)return;
  if(depts.find(d=>d.name===name)){alert('同じ名前の部署が既に存在します');return;}
  depts.push({name,parent});
  document.getElementById('dept-new-name').value='';
  renderDeptList(); initFilters();
}

function removeDept(name){
  const children=depts.filter(d=>d.parent===name);
  if(children.length){
    const toRemove=new Set();
    function collect(n){toRemove.add(n);depts.filter(d=>d.parent===n).forEach(d=>collect(d.name));}
    collect(name);
    if(!confirm(`「${name}」とその子部署（${toRemove.size-1}件）をまとめて削除しますか？`))return;
    depts=depts.filter(d=>!toRemove.has(d.name));
  } else {
    depts=depts.filter(d=>d.name!==name);
  }
  renderDeptList(); initFilters();
}


// ── コンテキストメニュー ──
function toggleCtxMenu(e, menuId) {
  e.stopPropagation();
  const menu = document.getElementById(menuId);
  if (!menu) return;
  const isOpen = menu.classList.contains('open');
  closeAllCtxMenus();
  if (!isOpen) {
    // ボタンの位置を取得
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    const menuH = 90; // メニューの概算高さ
    const spaceBelow = window.innerHeight - rect.bottom;
    const spaceAbove = rect.top;
    // 下に余裕がなければ上に展開
    if (spaceBelow < menuH && spaceAbove > menuH) {
      menu.style.top = '';
      menu.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    } else {
      menu.style.bottom = '';
      menu.style.top = (rect.bottom + 4) + 'px';
    }
    menu.style.right = (window.innerWidth - rect.right) + 'px';
    menu.classList.add('open');
  }
}
function closeAllCtxMenus() {
  document.querySelectorAll('.ctx-menu.open').forEach(m => m.classList.remove('open'));
}

function renameDept(oldName) {
  const newName = prompt(`部署名を変更します\n現在: ${oldName}\n\n新しい部署名を入力してください`, oldName);
  if (!newName || newName.trim() === '') return;
  const trimmed = newName.trim();
  if (trimmed === oldName) return;
  if (depts.find(d => d.name === trimmed)) { alert('同じ名前の部署が既に存在します'); return; }
  // depts内の該当レコードの名前を変更
  depts.forEach(d => {
    if (d.name === oldName) d.name = trimmed;
    if (d.parent === oldName) d.parent = trimmed;
  });
  renderDeptList(); initFilters();
}

function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}render();}
function getFiltered(){
  const q=v('f-word').toLowerCase(),st=v('f-status'),dp=v('f-dept'),tk=v('f-task'),pr=v('f-procurement'),mk=v('f-maker');
  const sf=v('f-start-from'),st2=v('f-start-to'),bf=v('f-buy-from'),bt=v('f-buy-to'),rf=v('f-renew-from'),rt=v('f-renew-to');
  return pcData.filter(r=>{
    if(q&&!((['シリアル番号','ID(PC名)','ユーザー','メールアドレス','メーカー','部署','メモ'].map(k=>r[k]||'').join('')).toLowerCase().includes(q)))return false;
    if(st&&r['ステータス']!==st)return false;
    if(dp&&r['部署']!==dp)return false;
    if(tk&&r['管理者のタスク']!==tk)return false;
    if(pr&&r['調達方法']!==pr)return false;
    if(mk&&r._makerNorm!==mk)return false;
    if(sf||st2){const ym=toInputDate(r['利用開始日']).substring(0,7);if(sf&&ym&&ym<sf.substring(0,7))return false;if(st2&&ym&&ym>st2.substring(0,7))return false;}
    if(bf||bt){const ym=toInputDate(r['購入/契約開始日']).substring(0,7);if(bf&&ym&&ym<bf.substring(0,7))return false;if(bt&&ym&&ym>bt.substring(0,7))return false;}
    if(rf||rt){const ym=toInputDate(r['契約更新日']).substring(0,7);if(rf&&ym&&ym<rf.substring(0,7))return false;if(rt&&ym&&ym>rt.substring(0,7))return false;}
    return true;
  }).sort((a,b)=>{const va=a[sortKey]||'',vb=b[sortKey]||'';return va<vb?-sortDir:va>vb?sortDir:0;});
}

  {k:'管理者(メールアドレス)',full:true},
  {sec:'調達・費用'},
  {k:'調達方法',type:'select_dynamic',opt:'proc'},
  {k:'支払い周期'},{k:'購入/利用料金'},{k:'通貨'},
  {k:'購入/契約開始日',type:'date'},{k:'廃棄日/解約日',type:'date'},{k:'契約更新日',type:'date'},
  {sec:'アカウント情報'},
  {k:'Officeアカウント',full:true},{k:'Officeパス'},
  {k:'Microsoftアカウント',full:true},{k:'Microsoftパス'},
  {k:'PIN'},{k:'Office助成金',type:'select',opts:['','◯','ー']},{k:'Office追加日',type:'date'},
  {sec:'その他'},
  {k:'メモ',type:'textarea',full:true},
];

function openAdd(){showModal({_id:Date.now()},true);}
function openEdit(id){const r=pcData.find(x=>x._id===id);if(r)showModal(r,false);}

function showModal(r,isNew){
  const tree=buildTree(depts);
  const deptOpts=flatDeptOptions(tree);
  const rows=FIELDS.map(f=>{
    if(f.sec)return`<div class="form-section">${esc(f.sec)}</div>`;
    const val=esc(r[f.k]||'');
    const cls='form-field'+(f.full?' full':'');
    let input='';
    if(f.type==='select')input=`<select id="fm-${esc(f.k)}">${f.opts.map(o=>`<option value="${esc(o)}"${r[f.k]===o?' selected':''}>${esc(o)||'未設定'}</option>`).join('')}</select>`;
    else if(f.type==='select_dynamic'){const opts=f.opt==='task'?taskOptions:procOptions;input=`<select id="fm-${esc(f.k)}"><option value="">未設定</option>${opts.map(o=>`<option value="${esc(o)}"${r[f.k]===o?' selected':''}>${esc(o)}</option>`).join('')}</select>`;}
    else if(f.type==='select_dept')input=`<select id="fm-${esc(f.k)}"><option value="">未設定</option>${deptOpts.map(({value,label})=>`<option value="${esc(value)}"${r[f.k]===value?' selected':''}>${esc(label)}</option>`).join('')}</select>`;
    else if(f.type==='textarea')input=`<textarea id="fm-${esc(f.k)}">${val}</textarea>`;
    else if(f.type==='date')input=`<input type="date" id="fm-${esc(f.k)}" value="${esc(toInputDate(r[f.k]||''))}">`;
    else input=`<input id="fm-${esc(f.k)}" value="${val}">`;
    return`<div class="${cls}"><label>${esc(f.k)}</label>${input}</div>`;
  }).join('');
  document.getElementById('modal-content').innerHTML=`
    <h2>${isNew?'新規PC登録':'PC情報を編集'}</h2>
    <div class="form-grid">${rows}</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveRecord(${r._id},${isNew})">保存してスプレッドシートに反映</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function onOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

async function saveRecord(id,isNew){
  const rec={_id:id};
  FIELDS.filter(f=>f.k).forEach(f=>{
    const el=document.getElementById('fm-'+f.k);
    let val=el?el.value:'';
    // date入力(YYYY-MM-DD)をYYYY/MM/DDに変換して保存
    if(f.type==='date'&&val&&/^\d{4}-\d{2}-\d{2}$/.test(val))val=val.replace(/-/g,'/');
    rec[f.k]=val;
  });
  rec._makerNorm=normMaker(rec['メーカー']);
  if(isNew)pcData.push(rec);
  else{const i=pcData.findIndex(x=>x._id===id);if(i>=0)pcData[i]=rec;}
  closeModal();initFilters();render();await savePC();
}

function confirmDelete(id){
  const r=pcData.find(x=>x._id===id);if(!r)return;
  document.getElementById('modal-content').innerHTML=`
    <h2>削除の確認</h2>
    <p style="font-size:14px;color:#888;margin-bottom:.75rem">以下のPCをスプレッドシートから削除します。</p>
    <p style="font-size:14px;font-weight:600;margin-bottom:1.5rem">${esc(r['シリアル番号'])||'—'} / ${esc(r['ID(PC名)'])||'—'} — ${esc(r['ユーザー'])||'—'}</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-danger" onclick="deleteRecord(${id})">削除する</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function deleteRecord(id){
  pcData=pcData.filter(x=>x._id!==id);expanded.delete(id);
  closeModal();render();await savePC();
}

loadAll();
</script>
</body>
