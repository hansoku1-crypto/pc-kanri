<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ハードウェア管理ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a}
#app{max-width:1400px;margin:0 auto;padding:1rem}
.nav{display:flex;gap:8px;margin-bottom:1rem;border-bottom:1px solid #e0e0da;padding-bottom:.75rem;align-items:center;flex-wrap:wrap}
.nav h1{font-size:16px;font-weight:700;margin-right:4px}
.main-tab{font-size:13px;padding:5px 14px;border:0.5px solid #d0d0ca;border-radius:20px;background:#fff;cursor:pointer;color:#555;white-space:nowrap}
.main-tab:hover{background:#f0f0ea}
.main-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.device-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:0.5px solid #e0e0da;align-items:center}
.device-tab{font-size:13px;padding:5px 14px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#555;white-space:nowrap}
.device-tab:hover{background:#f0f0ea}
.device-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.filter-card{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1rem;margin-bottom:1rem}
.filter-row1{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.filter-row2{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-top:8px;border-top:0.5px solid #eee}
.filter-search{flex:1;min-width:200px;max-width:320px;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none}
.filter-sel{font-size:12px;padding:5px 10px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;outline:none}
.filter-btn{font-size:12px;padding:5px 12px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.filter-btn:hover{background:#f5f5f3}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.filter-val{font-size:11px;opacity:.8}
.rc{font-size:12px;color:#888;margin-left:auto}
.stats{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.stat{background:#fff;border:0.5px solid #e0e0da;border-radius:8px;padding:.5rem .9rem;display:flex;align-items:center;gap:6px}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-label{font-size:12px;color:#666}
.stat-val{font-size:16px;font-weight:700;margin-left:2px}
.tbl-wrap{overflow-x:auto;border:0.5px solid #e0e0da;border-radius:12px;background:#fff;margin-bottom:1rem}
table{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f8f6;padding:8px 10px;text-align:left;font-weight:500;font-size:11px;color:#888;white-space:nowrap;border-bottom:0.5px solid #e0e0da;cursor:pointer;user-select:none}
th:hover{color:#1a1a1a}
td{padding:8px 10px;border-bottom:0.5px solid #f0f0ea;vertical-align:middle;white-space:nowrap;min-width:80px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.row-detail td{padding:0;background:#fafafa;border-bottom:0.5px solid #e8e8e4}
.row-detail-inner{padding:12px 16px;overflow-x:auto}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px 24px;margin-bottom:12px;min-width:600px}
.di label{font-size:11px;color:#888;display:block;margin-bottom:2px}
.di span{font-size:13px;word-break:break-all}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500}
.badge-dot{width:6px;height:6px;border-radius:50%}
.s-active{background:#E8F5E9;color:#2E7D32}.s-scheduled{background:#E3F2FD;color:#1565C0}.s-stock{background:#F3E5F5;color:#6A1B9A}.s-prep{background:#FFF8E1;color:#F57F17}.s-disposed{background:#EFEBE9;color:#4E342E}.s-unknown{background:#FFEBEE;color:#B71C1C}
.task-lend{background:#FFF3E0;color:#E65100}.task-return{background:#E8F5E9;color:#2E7D32}
.btn{font-size:12px;padding:5px 12px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;white-space:nowrap}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.btn-primary:hover{background:#333}
.btn-danger{color:#c0392b;border-color:#e0a0a0}.btn-danger:hover{background:#fdf0f0}
.btn-sm{font-size:11px;padding:3px 9px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(700px,96vw);margin-bottom:40px;border:0.5px solid #e0e0da}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;color:#888}
.form-field input,.form-field select,.form-field textarea{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:6px 8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
.form-field textarea{resize:vertical;min-height:56px}
.form-section{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;grid-column:1/-1;margin-top:8px;padding-top:8px;border-top:0.5px solid #eee}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #eee}
.date-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center}
.date-modal-bg.open{display:flex}
.date-modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(480px,96vw);border:0.5px solid #e0e0da}
.date-modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.date-range-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-range-row input{flex:1;min-width:120px;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:6px 8px;outline:none}
.date-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:0.5px solid #eee}
.prop-table-wrap{overflow-x:auto;border:0.5px solid #e0e0da;border-radius:8px;margin-bottom:1rem}
.prop-table{width:100%;border-collapse:collapse;font-size:13px}
.prop-table th{background:#f8f8f6;padding:8px 12px;font-size:11px;font-weight:600;color:#888;border-bottom:0.5px solid #e0e0da;white-space:nowrap;text-align:center}
.prop-table th:first-child{text-align:left;min-width:160px}
.prop-table td{padding:8px 12px;border-bottom:0.5px solid #f0f0ea;text-align:center}
.prop-table td:first-child{text-align:left}
.prop-table tr:last-child td{border-bottom:none}
.prop-table tr:hover td{background:#fafafa}
.toggle{display:inline-flex;align-items:center;cursor:pointer}
.toggle input{display:none}
.toggle-track{width:36px;height:20px;background:#ddd;border-radius:10px;position:relative;transition:background .2s}
.toggle input:checked+.toggle-track{background:#1a1a1a}
.toggle-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-track .toggle-thumb{left:18px}
.master-panel{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.master-panel h3{font-size:14px;font-weight:600;margin-bottom:.75rem}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.dept-list{border:0.5px solid #e0e0da;border-radius:8px;overflow:hidden;margin-bottom:1rem}
.dept-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:8px 12px;border-bottom:0.5px solid #f0f0ea;background:#fff}
.dept-row:last-child{border-bottom:none}
.dept-row:hover{background:#fafafa}
.dept-name-cell{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}
.dept-parent-sel{font-size:12px;border:0.5px solid #d0d0ca;border-radius:5px;padding:3px 8px;background:#fff;color:#555;outline:none;max-width:180px}
.dept-level-badge{font-size:10px;padding:2px 7px;border-radius:8px;white-space:nowrap}
.master-list{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem;max-height:300px;overflow-y:auto}
.master-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fafafa;border-radius:6px;border:0.5px solid #eee}
.master-item span{flex:1;font-size:13px}
.master-add{display:flex;gap:8px;margin-top:4px}
.master-add input{flex:1;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none}
.add-form{background:#f8f8f6;border-radius:8px;padding:1rem;margin-top:.5rem}
.add-form h4{font-size:12px;font-weight:600;color:#888;margin-bottom:.75rem}
.add-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.add-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:140px}
.add-field label{font-size:11px;color:#888}
.add-field input,.add-field select{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none;background:#fff;width:100%}
.ctx-menu-wrap{position:relative;flex-shrink:0}
.ctx-btn{font-size:16px;width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:#aaa;border-radius:5px;display:flex;align-items:center;justify-content:center}
.ctx-btn:hover{background:#f0f0ea;color:#555}
.ctx-menu{display:none;position:fixed;background:#fff;border:0.5px solid #e0e0da;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:160px;z-index:1000;overflow:hidden}
.ctx-menu.open{display:block}
.ctx-menu-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;cursor:pointer;color:#1a1a1a;white-space:nowrap}
.ctx-menu-item:hover{background:#f5f5f3}
.ctx-menu-item.danger{color:#c0392b}.ctx-menu-item.danger:hover{background:#fdf0f0}
.ctx-menu-sep{height:0.5px;background:#eee;margin:2px 0}
.loading{padding:3rem;text-align:center;color:#888}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e0e0da;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.save-ind{font-size:12px;color:#888}.save-ind.saving{color:#d4800a}.save-ind.saved{color:#3B6D11}.save-ind.error{color:#c0392b}
.sort-arrow{font-size:10px;margin-left:2px}
.empty{padding:3rem;text-align:center;color:#888}
.dept-empty{padding:2rem;text-align:center;font-size:13px;color:#aaa}
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <h1>ハードウェア管理</h1>
    <button class="main-tab active" onclick="showMainTab('hw')">ハードウェア</button>
    <button class="main-tab" onclick="showMainTab('prop')">プロパティ設定</button>
    <button class="main-tab" onclick="showMainTab('dept')">部署マスタ</button>
    <button class="main-tab" onclick="showMainTab('pos')">役職マスタ</button>
    <div class="nav-right">
      <button class="btn" onclick="reloadCurrent()" id="reload-btn">↺ 再読み込み</button>
      <span class="save-ind" id="save-ind"></span>
    </div>
  </div>

  <div id="tab-hw">
    <div class="device-tabs" id="device-tabs"></div>
    <div class="filter-card">
      <div class="filter-row1">
        <input type="text" class="filter-search" id="f-word" placeholder="シリアル番号・ID・ユーザー..." oninput="render()">
        <select id="f-status" class="filter-sel" onchange="render()">
          <option value="">ステータス: すべて</option>
          <option>利用中</option><option>利用予定</option><option>在庫</option><option>準備中</option><option>廃棄・解約</option><option>所在不明</option>
        </select>
        <select id="f-dept" class="filter-sel" onchange="render()" style="min-width:110px"><option value="">部署: すべて</option></select>
        <select id="f-task" class="filter-sel" onchange="render()" style="min-width:130px"><option value="">管理者のタスク: すべて</option></select>
        <select id="f-maker" class="filter-sel" onchange="render()" style="min-width:110px"><option value="">メーカー: すべて</option></select>
      </div>
      <div class="filter-row2">
        <button class="filter-btn" id="btn-start" onclick="openDateModal('start')">利用開始日 <span class="filter-val" id="lbl-start"></span></button>
        <button class="filter-btn" id="btn-buy" onclick="openDateModal('buy')">購入/契約開始日 <span class="filter-val" id="lbl-buy"></span></button>
        <button class="filter-btn" id="btn-renew" onclick="openDateModal('renew')">契約更新日 <span class="filter-val" id="lbl-renew"></span></button>
        <button class="btn" onclick="resetFilters()">リセット</button>
        <button class="btn btn-primary" onclick="openAdd()">＋ 新規登録</button>
        <span class="rc" id="result-count"></span>
      </div>
    </div>
    <input type="hidden" id="f-start-from"><input type="hidden" id="f-start-to">
    <input type="hidden" id="f-buy-from"><input type="hidden" id="f-buy-to">
    <input type="hidden" id="f-renew-from"><input type="hidden" id="f-renew-to">
    <div class="stats" id="stats"></div>
    <div class="tbl-wrap"><table id="main-table"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  </div>

  <div id="tab-prop" style="display:none">
    <div class="master-panel">
      <div class="section-header">
        <div><h3>デバイス種別・プロパティの編集</h3><p style="font-size:12px;color:#aaa;margin-top:4px">各プロパティをデバイス種別ごとに表示/非表示できます。</p></div>
        <button class="btn btn-primary btn-sm" onclick="saveTypeConfig()">保存</button>
      </div>
      <div id="prop-table-container"><div class="loading"><span class="spinner"></span>読み込み中...</div></div>
    </div>
  </div>

  <div id="tab-dept" style="display:none">
    <div class="master-panel">
      <div class="section-header"><h3>部署マスタ（3階層対応）</h3><button class="btn btn-primary btn-sm" onclick="saveDeptMaster()">スプレッドシートに保存</button></div>
      <p style="font-size:12px;color:#aaa;margin-bottom:.75rem">「親部署」欄を変更すると階層を移動できます。</p>
      <div id="dept-list" class="dept-list"></div>
      <div class="add-form"><h4>部署を追加</h4>
        <div class="add-row">
          <div class="add-field"><label>部署名</label><input type="text" id="dept-new-name" placeholder="例：串カツ田中立川店"></div>
          <div class="add-field"><label>親部署（任意）</label><select id="dept-new-parent"><option value="">なし（最上位）</option></select></div>
          <button class="btn btn-primary" onclick="addDept()" style="flex-shrink:0">追加</button>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-pos" style="display:none">
    <div class="master-panel">
      <div class="section-header"><h3>役職マスタ</h3><button class="btn btn-primary btn-sm" onclick="savePosMaster()">スプレッドシートに保存</button></div>
      <div class="master-list" id="pos-list"></div>
      <div class="master-add"><input type="text" id="pos-new" placeholder="新しい役職名を入力..."><button class="btn" onclick="addPosition()">追加</button></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)"><div class="modal" id="modal-content"></div></div>

<div class="date-modal-bg" id="date-modal-bg" onclick="closeDateModalBg(event)">
  <div class="date-modal">
    <h3 id="date-modal-title">日付で絞り込み</h3>
    <div class="date-range-row">
      <input type="date" id="dm-from"><span style="color:#aaa">〜</span><input type="date" id="dm-to">
    </div>
    <div class="date-modal-actions">
      <button class="btn" onclick="clearDateFilter()">クリア</button>
      <button class="btn" onclick="document.getElementById('date-modal-bg').classList.remove('open')">キャンセル</button>
      <button class="btn btn-primary" onclick="applyDateFilter()">絞り込み結果を表示</button>
    </div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycby11ubaJ5zmNlNvP_iXxQofudIlkbtaugltwSdgfqBq3sEkcs5eWUf6ukFo8V6eHUqU/exec';
const DEVICE_TYPES=['PC','スマートフォン','Webカメラ','PCモニター','スピーカー・マイク','延長コード','モバイルWifi'];
const COMMON_HEADERS=['シリアル番号','ID(PC名)','ステータス','ユーザー','メールアドレス','管理者のタスク','利用開始日','利用終了日','ハードウェア割当','管理グループ','管理者(メールアドレス)','調達方法','支払い周期','購入/利用料金','通貨','購入/契約開始日','廃棄日/解約日','契約更新日','メモ','購入場所/サービス名','メーカー','製品名','シリアルナンバー','利用部署','注文番号/購入ID','購入者/選定者'];
const EXTRA_HEADERS={'PC':['Officeアカウント','Officeパス','Microsoftアカウント','Microsoftパス','PIN','Office助成金','Office追加日'],'スマートフォン':['電話番号','キャリア','回線契約日'],'Webカメラ':[],'PCモニター':[],'スピーカー・マイク':[],'延長コード':[],'モバイルWifi':['IMEI番号','営業担当者TEL']};
const DATE_FIELDS=['利用開始日','利用終了日','購入/契約開始日','廃棄日/解約日','契約更新日','Office追加日','回線契約日'];
const DEFAULT_TASKS=['貸出','返却','なし'];
const STATUS_LIST=['利用中','利用予定','在庫','準備中','廃棄・解約','所在不明'];
const STATUS_CLASS={'利用中':'s-active','利用予定':'s-scheduled','在庫':'s-stock','準備中':'s-prep','廃棄・解約':'s-disposed','所在不明':'s-unknown'};
const STATUS_COLOR={'利用中':'#4CAF50','利用予定':'#2196F3','在庫':'#9C27B0','準備中':'#FF9800','廃棄・解約':'#795548','所在不明':'#F44336'};

let currentType='PC',dataByType={},typeConfig={},depts=[],positions=[],taskOptions=[...DEFAULT_TASKS];
let sortKey='利用開始日',sortDir=-1,expanded=new Set(),currentDateTarget='start';

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toDisplay(s){if(!s)return'';const d=s.trim();if(/^\d{8}$/.test(d))return`${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d.replace(/-/g,'/');if(/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(d)){const p=d.split('/');return`${p[0]}/${p[1].padStart(2,'0')}/${p[2].padStart(2,'0')}`;}return d;}
function toInputDate(s){return toDisplay(s).replace(/\//g,'-');}
function normDate(s){return toInputDate(s).substring(0,7);}
function normMaker(s){if(!s)return'';const t=s.trim().toUpperCase();if(t.startsWith('LENOVO'))return'Lenovo';if(t.startsWith('DELL'))return'DELL';if(t.startsWith('HP'))return'HP';if(t.includes('マウス'))return'マウスコンピュータ';return s.trim();}
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function getTypeHeaders(){return[...COMMON_HEADERS,...(EXTRA_HEADERS[currentType]||[])];}

function showInd(state,msg){
  const el=document.getElementById('save-ind');el.className='save-ind '+state;el.textContent=msg||'';
  const btn=document.getElementById('reload-btn');
  if(btn){btn.disabled=state==='saving';btn.style.opacity=state==='saving'?'0.4':'';}
  if(state==='saved')setTimeout(()=>{el.textContent='';el.className='save-ind';},3000);
}

async function gasGet(action,extra=''){const url=GAS_URL+'?action='+action+(extra?'&'+extra:'')+'&t='+Date.now();const res=await fetch(url,{cache:'no-store'});return res.json();}
async function gasPost(action,data,extra={}){const body=Object.assign({action},extra,{data});const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});return res.json();}

function showMainTab(name){
  ['hw','prop','dept','pos'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'':'none';});
  document.querySelectorAll('.main-tab').forEach((el,i)=>{el.classList.toggle('active',['hw','prop','dept','pos'][i]===name);});

function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}render();}

function getFiltered(){
  const data=dataByType[currentType]||[];
  const q=v('f-word').toLowerCase(),st=v('f-status'),dp=v('f-dept'),tk=v('f-task'),mk=v('f-maker');
  const sf=v('f-start-from'),st2=v('f-start-to'),bf=v('f-buy-from'),bt=v('f-buy-to'),rf=v('f-renew-from'),rt=v('f-renew-to');
  return data.filter(r=>{
    if(q&&!(getTypeHeaders().map(h=>r[h]||'').join('').toLowerCase().includes(q)))return false;
    if(st&&r['ステータス']!==st)return false;
    if(dp&&r['利用部署']!==dp)return false;
    if(tk&&r['管理者のタスク']!==tk)return false;
    if(mk&&r._makerNorm!==mk)return false;
    if(sf||st2){const ym=normDate(r['利用開始日']);if(sf&&ym&&ym<sf.substring(0,7))return false;if(st2&&ym&&ym>st2.substring(0,7))return false;}
    if(bf||bt){const ym=normDate(r['購入/契約開始日']);if(bf&&ym&&ym<bf.substring(0,7))return false;if(bt&&ym&&ym>bt.substring(0,7))return false;}
    if(rf||rt){const ym=normDate(r['契約更新日']);if(rf&&ym&&ym<rf.substring(0,7))return false;if(rt&&ym&&ym>rt.substring(0,7))return false;}
    return true;
  }).sort((a,b)=>{const va=a[sortKey]||'',vb=b[sortKey]||'';return va<vb?-sortDir:va>vb?sortDir:0;});
}

function getVisibleHeaders(){
  if(!typeConfig||Object.keys(typeConfig).length===0)return COMMON_HEADERS.slice(0,10);
  return Object.keys(typeConfig).filter(p=>typeConfig[p]&&typeConfig[p][currentType]);
}

  const headers=getTypeHeaders();

  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="${displayCols.length+2}" class="empty">該当するデータが見つかりません</td></tr>`;return;}
  tbody.innerHTML=rows.map(r=>{
    const sc=STATUS_CLASS[r['ステータス']]||'';
    const statusBadge=r['ステータス']?`<span class="badge ${sc}"><span class="badge-dot" style="background:${STATUS_COLOR[r['ステータス']]||'#999'}"></span>${esc(r['ステータス'])}</span>`:'—';
    const taskBadge=r['管理者のタスク']&&r['管理者のタスク']!=='なし'?`<span class="badge ${r['管理者のタスク']==='貸出'?'task-lend':'task-return'}">${esc(r['管理者のタスク'])}</span>`:r['管理者のタスク']||'—';
    const cells=displayCols.map(h=>{
      if(h==='ステータス')return`<td>${statusBadge}</td>`;
      if(h==='管理者のタスク')return`<td>${taskBadge}</td>`;
      if(DATE_FIELDS.includes(h))return`<td style="font-size:12px">${esc(toDisplay(r[h]))||'—'}</td>`;
      return`<td>${esc((r[h]||'—').toString().substring(0,30))}</td>`;
    }).join('');
    const detail=expanded.has(r._id)?`<tr class="row-detail"><td colspan="${displayCols.length+2}"><div class="row-detail-inner">
      <div class="detail-grid">${headers.map(h=>`<div class="di"><label>${esc(h)}</label><span>${DATE_FIELDS.includes(h)?esc(toDisplay(r[h])):esc(r[h])||'—'}</span></div>`).join('')}</div>

        <button class="btn btn-sm" onclick="openEdit(${r._id});event.stopPropagation()">編集</button>

      else if(f==='利用部署')input=`<select id="fm-${esc(f)}"><option value="">未設定</option>${deptOpts.map(({value,label})=>`<option value="${esc(value)}"${r[f]===value?' selected':''}>${esc(label)}</option>`).join('')}</select>`;

async function saveRecord(id,isNew){
  const headers=getTypeHeaders();const rec={_id:id};
  headers.forEach(f=>{const el=document.getElementById('fm-'+f);if(!el){rec[f]='';return;}let val=el.value;if(DATE_FIELDS.includes(f)&&val&&/^\d{4}-\d{2}-\d{2}$/.test(val))val=val.replace(/-/g,'/');rec[f]=val;});
  rec._makerNorm=normMaker(rec['メーカー']);
  const data=dataByType[currentType]||[];
  if(isNew)dataByType[currentType]=[...data,rec];
  else{const i=data.findIndex(x=>x._id===id);if(i>=0){const nd=[...data];nd[i]=rec;dataByType[currentType]=nd;}}
  closeModal();updateFilters();render();
  showInd('saving','保存中...');
  try{
    const payload=(dataByType[currentType]||[]).map(r=>{const rc={};headers.forEach(h=>{rc[h]=r[h]||'';});return rc;});
    const res=await gasPost('saveAll',payload,{type:currentType});
    if(res.error)throw new Error(res.error);
    showInd('saved',`保存済み ✓ (${res.saved}件)`);
  }catch(e){showInd('error','保存エラー: '+e.message);}
}

const DATE_MODAL_CONFIG={start:{title:'利用開始日で絞り込み',from:'f-start-from',to:'f-start-to',btn:'btn-start',lbl:'lbl-start'},buy:{title:'購入/契約開始日で絞り込み',from:'f-buy-from',to:'f-buy-to',btn:'btn-buy',lbl:'lbl-buy'},renew:{title:'契約更新日で絞り込み',from:'f-renew-from',to:'f-renew-to',btn:'btn-renew',lbl:'lbl-renew'}};

function buildTree(items){const map={},roots=[];items.forEach(d=>{map[d.name]={...d,children:[]};});items.forEach(d=>{if(d.parent&&map[d.parent])map[d.parent].children.push(map[d.name]);else roots.push(map[d.name]);});return roots;}
function flatDeptOptions(tree,depth=0){const opts=[];tree.forEach(node=>{opts.push({value:node.name,label:'　'.repeat(depth)+node.name});if(node.children.length)opts.push(...flatDeptOptions(node.children,depth+1));});return opts;}
function treeToFlat(nodes,parent=''){const result=[];nodes.forEach(node=>{result.push({name:node.name,parent});if(node.children.length)result.push(...treeToFlat(node.children,node.name));});return result;}
function getDeptDepth(name){let d=depts.find(x=>x.name===name);let depth=0;while(d&&d.parent){depth++;d=depts.find(x=>x.name===d.parent);if(depth>10)break;}return depth;}
function isDescendant(anc,target){let cur=depts.find(d=>d.name===target);let count=0;while(cur&&cur.parent){if(cur.parent===anc)return true;cur=depts.find(d=>d.name===cur.parent);if(++count>20)break;}return false;}

function renderDeptList(){
  const listEl=document.getElementById('dept-list');if(!listEl)return;
  if(!depts.length){listEl.innerHTML='<div class="dept-empty">まだ登録されていません</div>';updateDeptParentSelect();return;}
  const ordered=treeToFlat(buildTree(depts));const allOpts=flatDeptOptions(buildTree(depts));
  const lc=[['#f0f0ea','#888'],['#F3E5F5','#6A1B9A'],['#E3F2FD','#1565C0']];const ll=['L1 最上位','L2 中階層','L3 末端'];
  listEl.innerHTML=ordered.map(d=>{
    const depth=getDeptDepth(d.name);const [bg,color]=lc[Math.min(depth,2)];
    const badge=`<span class="dept-level-badge" style="background:${bg};color:${color}">${ll[Math.min(depth,2)]}</span>`;
    const validOpts=allOpts.filter(o=>o.value!==d.name&&!isDescendant(d.name,o.value));
    const selOpts='<option value="">なし（最上位）</option>'+validOpts.map(o=>`<option value="${esc(o.value)}"${d.parent===o.value?' selected':''}>${esc(o.label)}</option>`).join('');
    const menuId='ctx-'+d.name.replace(/[^a-zA-Z0-9]/g,'_');
    return`<div class="dept-row"><div class="dept-name-cell"><span style="color:#ddd">${'─'.repeat(depth)}</span><span>${esc(d.name)}</span></div>${badge}<select class="dept-parent-sel" onchange="changeDeptParent('${esc(d.name)}',this.value)">${selOpts}</select><div class="ctx-menu-wrap"><button class="ctx-btn" onclick="toggleCtxMenu(event,'${esc(menuId)}')">⋯</button><div class="ctx-menu" id="${esc(menuId)}"><div class="ctx-menu-item" onclick="renameDept('${esc(d.name)}');closeAllCtxMenus()">✏ 部署名を変更</div><div class="ctx-menu-sep"></div><div class="ctx-menu-item danger" onclick="removeDept('${esc(d.name)}');closeAllCtxMenus()">🗑 部署を削除</div></div></div></div>`;
  }).join('');
  updateDeptParentSelect();
}
function changeDeptParent(name,newParent){const item=depts.find(d=>d.name===name);if(item){item.parent=newParent;renderDeptList();updateFilters();}}
function updateDeptParentSelect(){const sel=document.getElementById('dept-new-parent');if(!sel)return;const cur=sel.value;while(sel.options.length>1)sel.remove(1);flatDeptOptions(buildTree(depts)).forEach(({value,label})=>{const o=document.createElement('option');o.value=value;o.textContent=label;if(value===cur)o.selected=true;sel.appendChild(o);});}
function addDept(){const name=document.getElementById('dept-new-name').value.trim();const parent=document.getElementById('dept-new-parent').value;if(!name)return;if(depts.find(d=>d.name===name)){alert('同じ名前の部署が既に存在します');return;}depts.push({name,parent});document.getElementById('dept-new-name').value='';renderDeptList();updateFilters();}
function renameDept(oldName){const newName=prompt(`部署名を変更\n現在: ${oldName}\n\n新しい部署名:`,oldName);if(!newName||newName.trim()===''||newName.trim()===oldName)return;const trimmed=newName.trim();if(depts.find(d=>d.name===trimmed)){alert('同じ名前が既に存在します');return;}depts.forEach(d=>{if(d.name===oldName)d.name=trimmed;if(d.parent===oldName)d.parent=trimmed;});renderDeptList();updateFilters();}
function removeDept(name){const toRemove=new Set();function collect(n){toRemove.add(n);depts.filter(d=>d.parent===n).forEach(d=>collect(d.name));}collect(name);if(toRemove.size>1&&!confirm(`「${name}」とその子部署（${toRemove.size-1}件）をまとめて削除しますか？`))return;depts=depts.filter(d=>!toRemove.has(d.name));renderDeptList();updateFilters();}
async function saveDeptMaster(){showInd('saving','保存中...');try{const flat=treeToFlat(buildTree(depts));const res=await gasPost('saveDepts',flat);if(res.error)throw new Error(res.error);depts=flat;showInd('saved','部署マスタ保存済み ✓');}catch(e){showInd('error','保存エラー: '+e.message);}}

function toggleCtxMenu(e,menuId){e.stopPropagation();const menu=document.getElementById(menuId);if(!menu)return;const isOpen=menu.classList.contains('open');closeAllCtxMenus();if(!isOpen){const btn=e.currentTarget;const rect=btn.getBoundingClientRect();const menuH=90;const spaceBelow=window.innerHeight-rect.bottom;if(spaceBelow<menuH&&rect.top>menuH){menu.style.bottom=(window.innerHeight-rect.top+4)+'px';menu.style.top='';}else{menu.style.top=(rect.bottom+4)+'px';menu.style.bottom='';}menu.style.right=(window.innerWidth-rect.right)+'px';menu.classList.add('open');}}
function closeAllCtxMenus(){document.querySelectorAll('.ctx-menu.open').forEach(m=>m.classList.remove('open'));}
document.addEventListener('click',closeAllCtxMenus);

function renderPosList(){const el=document.getElementById('pos-list');if(!el)return;if(!positions.length){el.innerHTML='<p style="font-size:13px;color:#aaa;padding:8px">まだ登録されていません</p>';return;}el.innerHTML=positions.map((item,i)=>`<div class="master-item"><span>${esc(item)}</span><button class="btn btn-sm btn-danger" onclick="removePosition(${i})">削除</button></div>`).join('');}
function addPosition(){const input=document.getElementById('pos-new');const val=input.value.trim();if(!val)return;positions.push(val);input.value='';renderPosList();}
function removePosition(idx){positions.splice(idx,1);renderPosList();}
async function savePosMaster(){showInd('saving','保存中...');try{const res=await gasPost('savePositions',positions);if(res.error)throw new Error(res.error);showInd('saved','役職マスタ保存済み ✓');}catch(e){showInd('error','保存エラー: '+e.message);}}

renderDeviceTabs();
loadAll();
</script>
