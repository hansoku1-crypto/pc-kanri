<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ソフトウェア管理ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a}
#app{max-width:1400px;margin:0 auto;padding:1rem}

/* ナビ */
.nav{display:flex;gap:8px;margin-bottom:1rem;border-bottom:1px solid #e0e0da;padding-bottom:.75rem;align-items:center;flex-wrap:wrap}
.nav h1{font-size:16px;font-weight:700;margin-right:4px}
.main-tab{font-size:13px;padding:5px 14px;border:0.5px solid #d0d0ca;border-radius:20px;background:#fff;cursor:pointer;color:#555;white-space:nowrap}
.main-tab:hover{background:#f0f0ea}
.main-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.save-ind{font-size:12px;color:#888}
.save-ind.saving{color:#d4800a}
.save-ind.saved{color:#3B6D11}
.save-ind.error{color:#c0392b}

/* ボタン */
.btn{font-size:12px;padding:5px 12px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;white-space:nowrap}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{color:#c0392b;border-color:#e0a0a0}
.btn-danger:hover{background:#fdf0f0}
.btn-sm{font-size:11px;padding:3px 9px}

/* フィルター */
.filter-card{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1rem;margin-bottom:1rem}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-search{flex:1;min-width:200px;max-width:360px;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none}
.filter-sel{font-size:12px;padding:5px 10px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;outline:none}
.filter-btn{font-size:12px;padding:5px 12px;border:0.5px solid #d0d0ca;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.filter-btn:hover{background:#f5f5f3}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.filter-val{font-size:11px;opacity:.8}
.rc{font-size:12px;color:#888;margin-left:auto}

/* テーブル */
.tbl-wrap{overflow:auto;border:0.5px solid #e0e0da;border-radius:12px;background:#fff;margin-bottom:1rem;max-height:calc(100vh - 280px)}
table{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px}
th{position:sticky;top:0;z-index:10;background:#f8f8f6;padding:8px 12px;text-align:left;font-weight:500;font-size:11px;color:#888;white-space:nowrap;border-bottom:0.5px solid #e0e0da;cursor:pointer;user-select:none}
th:hover{color:#1a1a1a}
td{padding:8px 12px;border-bottom:0.5px solid #f0f0ea;vertical-align:middle;white-space:nowrap;min-width:80px}
tr:last-child td{border-bottom:none}
tr.sw-row:hover td{background:#f5f5f3;cursor:pointer}
.sort-arrow{font-size:10px;margin-left:2px}
.empty{padding:3rem;text-align:center;color:#888}

/* バッジ */
.badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;font-weight:500}
.badge-renewal{background:#FFF3E0;color:#E65100}
.badge-genre{background:#E3F2FD;color:#1565C0}

/* ソフトウェアアイコン */
.sw-icon{width:28px;height:28px;border-radius:6px;background:#e0e0da;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.sw-icon img{width:100%;height:100%;object-fit:cover}
.sw-name-cell{display:flex;align-items:center;gap:8px}
.sw-sub{font-size:11px;color:#aaa}

/* マスタパネル */
.master-panel{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.master-panel h3{font-size:14px;font-weight:600;margin-bottom:.75rem}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.master-list{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem;max-height:300px;overflow-y:auto}
.master-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fafafa;border-radius:6px;border:0.5px solid #eee}
.master-item span{flex:1;font-size:13px}
.master-add{display:flex;gap:8px;margin-top:4px}
.master-add input{flex:1;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:5px 8px;outline:none}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(700px,96vw);margin-bottom:40px;border:0.5px solid #e0e0da}
.modal h2{font-size:16px;font-weight:600;margin-bottom:1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;color:#888}
.form-field input,.form-field select,.form-field textarea{font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:6px 8px;background:#fff;color:#1a1a1a;outline:none;width:100%}
.form-field textarea{resize:vertical;min-height:80px}
.form-section{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;grid-column:1/-1;margin-top:8px;padding-top:8px;border-top:0.5px solid #eee}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #eee}

/* 日付モーダル */
.date-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center}
.date-modal-bg.open{display:flex}
.date-modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(480px,96vw);border:0.5px solid #e0e0da}
.date-modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.date-range-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-range-row input{flex:1;min-width:120px;font-size:13px;border:0.5px solid #d0d0ca;border-radius:6px;padding:6px 8px;outline:none}
.date-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:0.5px solid #eee}

/* 個別ページ */
.sw-detail{display:none}
.sw-detail.open{display:block}
.sw-header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:0.5px solid #e0e0da}
.sw-header-icon{width:48px;height:48px;border-radius:10px;background:#e0e0da;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.sw-header-info h2{font-size:18px;font-weight:700}
.sw-header-info p{font-size:12px;color:#aaa;margin-top:2px}
.sw-header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.breadcrumb{font-size:12px;color:#aaa;margin-bottom:.5rem}
.breadcrumb a{color:#aaa;text-decoration:none;cursor:pointer}
.breadcrumb a:hover{color:#1a1a1a}

/* タブ */
.detail-tabs{display:flex;gap:0;border-bottom:1px solid #e0e0da;margin-bottom:1.25rem}
.detail-tab{font-size:13px;padding:8px 16px;border:none;background:transparent;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.detail-tab:hover{color:#1a1a1a}
.detail-tab.active{color:#1a1a1a;font-weight:600;border-bottom-color:#1a1a1a}
.tab-content{display:none}
.tab-content.active{display:block}

/* 利用状況サマリー */
.usage-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:1rem}
.usage-card{background:#fff;border:0.5px solid #e0e0da;border-radius:8px;padding:.75rem 1rem}
.usage-label{font-size:11px;color:#888;margin-bottom:4px}
.usage-val{font-size:20px;font-weight:700}
.usage-sub{font-size:11px;color:#aaa;margin-top:2px}

/* アカウントテーブル */
.acc-tbl-wrap{overflow:auto;border:0.5px solid #e0e0da;border-radius:12px;background:#fff;max-height:calc(100vh - 420px)}
.acc-tbl-wrap table{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px}
.acc-tbl-wrap th{position:sticky;top:0;z-index:10;background:#f8f8f6;padding:8px 12px;font-size:11px;font-weight:500;color:#888;border-bottom:0.5px solid #e0e0da;white-space:nowrap;cursor:pointer;user-select:none}
.acc-tbl-wrap td{padding:8px 12px;border-bottom:0.5px solid #f0f0ea;white-space:nowrap;min-width:100px}
.acc-tbl-wrap tr:last-child td{border-bottom:none}
.acc-tbl-wrap tr:hover td{background:#fafafa}

/* 契約情報 */
.contract-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px 32px;background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1.5rem}
.contract-item label{font-size:11px;color:#888;display:block;margin-bottom:4px}
.contract-item span{font-size:14px}

/* メモ */
.memo-box{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1.25rem;min-height:200px;position:relative}
.memo-text{font-size:14px;line-height:1.7;white-space:pre-wrap;color:#1a1a1a}
.memo-edit-btn{position:absolute;top:1rem;right:1rem}

/* ローディング */
.loading{padding:3rem;text-align:center;color:#888}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e0e0da;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div class="nav">
    <h1>ソフトウェア管理</h1>
    <button class="main-tab active" onclick="showMainTab('list')">ソフトウェア</button>
    <button class="main-tab" onclick="showMainTab('genre')">ジャンルマスタ</button>
    <button class="main-tab" onclick="showMainTab('dept')">部署マスタ</button>
    <div class="nav-right">
      <button class="btn" onclick="reloadAll()" id="reload-btn">↺ 再読み込み</button>
      <span class="save-ind" id="save-ind"></span>
    </div>
  </div>

  <!-- ソフトウェア一覧 -->
  <div id="tab-list">
    <div class="filter-card">
      <div class="filter-row">
        <input type="text" class="filter-search" id="f-word" placeholder="ソフトウェア名で検索..." oninput="render()">
        <select id="f-genre" class="filter-sel" onchange="render()"><option value="">ジャンル: すべて</option></select>
        <select id="f-dept" class="filter-sel" onchange="render()"><option value="">管理部署: すべて</option></select>
        <button class="filter-btn" id="btn-renew" onclick="openDateModal()">契約更新日 <span class="filter-val" id="lbl-renew"></span></button>
        <button class="btn" onclick="resetFilters()">リセット</button>
        <button class="btn btn-primary" onclick="openAddSw()">＋ ソフトウェアを追加</button>
        <span class="rc" id="result-count"></span>
      </div>
    </div>
    <input type="hidden" id="f-renew-from"><input type="hidden" id="f-renew-to">
    <div class="tbl-wrap">
      <table id="sw-table">
        <thead><tr>
          <th style="width:240px" onclick="setSort('ソフトウェア名')">ソフトウェア名/ワークスペース名<span class="sort-arrow" id="s-ソフトウェア名"></span></th>
          <th onclick="setSort('契約プラン')">契約プラン<span class="sort-arrow" id="s-契約プラン"></span></th>
          <th onclick="setSort('合計月額料金')">合計月額料金<span class="sort-arrow" id="s-合計月額料金"></span></th>
          <th onclick="setSort('アカウント未利用率')">アカウント未利用率<span class="sort-arrow" id="s-アカウント未利用率"></span></th>
          <th onclick="setSort('総アカウント数')">総アカウント数<span class="sort-arrow" id="s-総アカウント数"></span></th>
          <th onclick="setSort('有償アカウント数')">有償アカウント数<span class="sort-arrow" id="s-有償アカウント数"></span></th>
          <th onclick="setSort('無償アカウント数')">無償アカウント数<span class="sort-arrow" id="s-無償アカウント数"></span></th>
          <th onclick="setSort('シャドーID数')">シャドーID数<span class="sort-arrow" id="s-シャドーID数"></span></th>
          <th onclick="setSort('契約の種類')">契約の種類<span class="sort-arrow" id="s-契約の種類"></span></th>
          <th onclick="setSort('支払いサイクル')">支払いサイクル<span class="sort-arrow" id="s-支払いサイクル"></span></th>
          <th onclick="setSort('契約開始日')">契約開始日<span class="sort-arrow" id="s-契約開始日"></span></th>
          <th onclick="setSort('契約更新日')">契約更新日<span class="sort-arrow" id="s-契約更新日"></span></th>
          <th onclick="setSort('管理部署')">管理部署<span class="sort-arrow" id="s-管理部署"></span></th>
          <th style="min-width:200px">メモ</th>
          <th onclick="setSort('最終取得日時')">最終取得日時<span class="sort-arrow" id="s-最終取得日時"></span></th>
          <th onclick="setSort('追加日時')">追加日時<span class="sort-arrow" id="s-追加日時"></span></th>
          <th style="width:70px">操作</th>
        </tr></thead>
        <tbody id="sw-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ジャンルマスタ -->
  <div id="tab-genre" style="display:none">
    <div class="master-panel">
      <div class="section-header"><h3>ジャンルマスタ</h3><button class="btn btn-primary btn-sm" onclick="saveGenres()">スプレッドシートに保存</button></div>
      <div class="master-list" id="genre-list"></div>
      <div class="master-add"><input type="text" id="genre-new" placeholder="新しいジャンル名を入力..."><button class="btn" onclick="addGenre()">追加</button></div>
    </div>
  </div>

  <!-- 部署マスタ -->
  <div id="tab-dept" style="display:none">
    <div class="master-panel">
      <div class="section-header"><h3>部署マスタ</h3><button class="btn btn-primary btn-sm" onclick="saveDepts()">スプレッドシートに保存</button></div>
      <div class="master-list" id="dept-list"></div>
      <div class="master-add"><input type="text" id="dept-new" placeholder="新しい部署名を入力..."><button class="btn" onclick="addDept()">追加</button></div>
    </div>
  </div>

  <!-- ソフトウェア個別ページ -->
  <div id="sw-detail" class="sw-detail">
    <div class="breadcrumb"><a onclick="backToList()">ソフトウェア管理</a> › <span id="detail-breadcrumb"></span></div>
    <div class="sw-header">
      <div class="sw-header-icon" id="detail-icon"></div>
      <div class="sw-header-info">
        <h2 id="detail-name"></h2>
        <p id="detail-genre"></p>
      </div>
      <div class="sw-header-right">
        <button class="btn" onclick="editCurrentSw()">✏ 編集</button>
      </div>
    </div>
    <div class="detail-tabs">
      <button class="detail-tab active" onclick="showDetailTab('usage')">利用状況</button>
      <button class="detail-tab" onclick="showDetailTab('contract')">契約情報</button>
      <button class="detail-tab" onclick="showDetailTab('memo')">メモ</button>
    </div>

    <!-- 利用状況タブ -->
    <div id="dtab-usage" class="tab-content active">
      <div class="usage-summary" id="usage-summary"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
        <div style="display:flex;gap:8px">
          <input type="text" class="filter-search" id="acc-word" placeholder="メールアドレス・名前で検索..." oninput="renderAccounts()" style="max-width:280px">
          <select id="acc-task" class="filter-sel" onchange="renderAccounts()"><option value="">管理者のタスク: すべて</option></select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openAddAccount()">＋ アカウントを追加</button>
      </div>
      <div class="acc-tbl-wrap">
        <table>
          <thead><tr>
            <th onclick="setAccSort('メンバーのメールアドレス')">メールアドレス<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('メンバー名')">メンバー名<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('管理者のタスク')">管理者のタスク<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('アカウント管理')">アカウント管理<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('アカウント')">アカウント<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('ライセンス')">ライセンス<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('利用状況アンケート')">利用状況アンケート<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('最近のアカウント利用')">最近のアカウント利用<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('利用開始日')">利用開始日<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('利用終了日')">利用終了日<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('アカウント作成日時')">アカウント作成日時<span class="sort-arrow"></span></th>
            <th onclick="setAccSort('アカウント削除日時')">アカウント削除日時<span class="sort-arrow"></span></th>
            <th style="min-width:160px">アカウントメモ</th>
            <th style="width:70px">操作</th>
          </tr></thead>
          <tbody id="acc-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 契約情報タブ -->
    <div id="dtab-contract" class="tab-content">
      <div class="contract-grid" id="contract-grid"></div>
    </div>

    <!-- メモタブ -->
    <div id="dtab-memo" class="tab-content">
      <div class="memo-box">
        <div class="memo-text" id="memo-text"></div>
        <button class="btn btn-sm memo-edit-btn" onclick="editMemo()">✏ 編集</button>
      </div>
    </div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)"><div class="modal" id="modal-content"></div></div>

<!-- 日付モーダル -->
<div class="date-modal-bg" id="date-modal-bg" onclick="closeDateModalBg(event)">
  <div class="date-modal">
    <h3>契約更新日で絞り込み</h3>
    <div class="date-range-row">
      <input type="date" id="dm-from"><span style="color:#aaa">〜</span><input type="date" id="dm-to">
    </div>
    <div class="date-modal-actions">
      <button class="btn" onclick="clearDateFilter()">クリア</button>
      <button class="btn" onclick="document.getElementById('date-modal-bg').classList.remove('open')">キャンセル</button>
      <button class="btn btn-primary" onclick="applyDateFilter()">絞り込み結果を表示</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'YOUR_GAS_URL_HERE'; // ← デプロイ後にURLを貼る

// 状態
let swList = [], accounts = [], genres = [], depts = [];
let currentSw = null;
let sortKey = '追加日時', sortDir = -1;
let accSortKey = 'メンバーのメールアドレス', accSortDir = 1;

// ── ユーティリティ ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function toDisplay(s){if(!s)return'';const d=s.trim();if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d.replace(/-/g,'/');if(/^\d{4}\/\d{1,2}\/\d{1,2}/.test(d))return d;return d;}
function normDateYM(s){if(!s)return'';return toDisplay(s).substring(0,7).replace(/\//g,'-');}

function showInd(state,msg){
  const el=document.getElementById('save-ind');el.className='save-ind '+state;el.textContent=msg||'';
  const btn=document.getElementById('reload-btn');
  if(btn){btn.disabled=state==='saving';btn.style.opacity=state==='saving'?'0.4':'';}
  if(state==='saved')setTimeout(()=>{el.textContent='';el.className='save-ind';},3000);
}

// ── API ──
async function gasGet(action,extra=''){
  const url=GAS_URL+'?action='+action+(extra?'&'+extra:'')+'&t='+Date.now();
  const res=await fetch(url,{cache:'no-store'});return res.json();
}
async function gasPost(action,data,extra={}){
  const body=Object.assign({action},extra,{data});
  const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return res.json();
}

// ── タブ ──
function showMainTab(name){
  ['list','genre','dept'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
    document.getElementById('sw-detail').classList.remove('open');
  });

function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}render();}

function getFiltered(){
  const q=v('f-word').toLowerCase(),gn=v('f-genre'),dp=v('f-dept');
  const rf=v('f-renew-from'),rt=v('f-renew-to');
  return swList.filter(r=>{
    if(q&&!r['ソフトウェア名'].toLowerCase().includes(q))return false;
    if(gn&&r['ジャンル']!==gn)return false;
    if(dp&&r['管理部署']!==dp)return false;
    if(rf||rt){const ym=normDateYM(r['契約更新日']);if(rf&&ym&&ym<rf.substring(0,7))return false;if(rt&&ym&&ym>rt.substring(0,7))return false;}
    return true;
  }).sort((a,b)=>{const va=a[sortKey]||'',vb=b[sortKey]||'';return va<vb?-sortDir:va>vb?sortDir:0;});
}

function isRenewalSoon(dateStr){
  if(!dateStr)return false;
  const d=new Date(toDisplay(dateStr).replace(/\//g,'-'));
  if(isNaN(d))return false;
  const diff=Math.round((d-new Date())/(1000*60*60*24));
  return diff>=0&&diff<=30;
}

  const color=colors[name]||'#888';
  return`<div class="sw-icon" style="background:${color}">${esc(name.charAt(0))}</div>`;
}

function toInputDate(s){return toDisplay(s).substring(0,10).replace(/\//g,'-');}

async function saveSwModal(oldName,isNew){
  const fields=['ソフトウェア名','ジャンル','契約プラン','総アカウント数','有償アカウント数','無償アカウント数','シャドーID数','アカウント未利用率','契約の種類','支払いサイクル','合計月額料金','契約開始日','契約更新日','管理部署','メモ'];
  const rec={};
  fields.forEach(f=>{
    const el=document.getElementById('fm-'+f);if(!el)return;
    let val=el.value;
    if(['契約開始日','契約更新日'].includes(f)&&val&&/^\d{4}-\d{2}-\d{2}$/.test(val))val=val.replace(/-/g,'/');
    rec[f]=val;
  });
  if(!rec['ソフトウェア名']){alert('ソフトウェア名は必須です');return;}
  const now=new Date();
  const ts=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(isNew)rec['追加日時']=ts;
  else{const old=swList.find(r=>r['ソフトウェア名']===oldName)||{};rec['追加日時']=old['追加日時']||ts;}
  if(isNew)swList.push(rec);
  else{const i=swList.findIndex(r=>r['ソフトウェア名']===oldName);if(i>=0)swList[i]=rec;}
  if(currentSw&&currentSw['ソフトウェア名']===oldName){currentSw=rec;renderContractInfo();renderMemo();}
  closeModal();render();
  await saveSw();
}

  showInd('saving','保存中...');

    if(res.error)throw new Error(res.error);
    showInd('saved',`保存済み ✓`);
  }catch(e){showInd('error','保存エラー: '+e.message);}
}

  swList=swList.filter(r=>r['ソフトウェア名']!==name);

  render();saveSw();
}

  gasPost('saveAccounts',accounts,{swName:currentSw['ソフトウェア名']});
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function onOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// ── 日付モーダル ──
function openDateModal(){
  document.getElementById('dm-from').value=v('f-renew-from');
  document.getElementById('dm-to').value=v('f-renew-to');
  document.getElementById('date-modal-bg').classList.add('open');
}
function closeDateModalBg(e){if(e.target===document.getElementById('date-modal-bg'))document.getElementById('date-modal-bg').classList.remove('open');}
function applyDateFilter(){
  const from=v('dm-from'),to=v('dm-to');
  document.getElementById('f-renew-from').value=from;
  document.getElementById('f-renew-to').value=to;
  const lbl=document.getElementById('lbl-renew');const btn=document.getElementById('btn-renew');
  if(from||to){lbl.textContent=(from?from.substring(0,7):'')+(to?'〜'+to.substring(0,7):'');btn.classList.add('active');}
  else{lbl.textContent='';btn.classList.remove('active');}
  document.getElementById('date-modal-bg').classList.remove('open');render();
}
function clearDateFilter(){
  ['dm-from','dm-to','f-renew-from','f-renew-to'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('lbl-renew').textContent='';
  document.getElementById('btn-renew').classList.remove('active');
  document.getElementById('date-modal-bg').classList.remove('open');render();
}

// ── マスタ ──
function renderGenreList(){
  const el=document.getElementById('genre-list');if(!el)return;
  el.innerHTML=genres.length?genres.map((g,i)=>`<div class="master-item"><span>${esc(g)}</span><button class="btn btn-sm btn-danger" onclick="genres.splice(${i},1);renderGenreList()">削除</button></div>`).join(''):'<p style="font-size:13px;color:#aaa;padding:8px">まだ登録されていません</p>';
}
function addGenre(){const input=document.getElementById('genre-new');const val=input.value.trim();if(!val)return;genres.push(val);input.value='';renderGenreList();}
async function saveGenres(){showInd('saving','保存中...');try{const res=await gasPost('saveGenres',genres);if(res.error)throw new Error(res.error);showInd('saved','ジャンルマスタ保存済み ✓');updateFilters();}catch(e){showInd('error','保存エラー: '+e.message);}}

// 部署をフラットな名前リストに変換（フィルター・セレクト用）
function getDeptNames(){return depts.map(d=>typeof d==='string'?d:d.name);}

// 階層付き選択肢
function flatDeptOptions(items,depth=0){
  const roots=items.filter(d=>(typeof d==='string'?'':d.parent)==='');
  const opts=[];
  function walk(nodes,d){nodes.forEach(n=>{const name=typeof n==='string'?n:n.name;opts.push({value:name,label:'　'.repeat(d)+name});const children=items.filter(x=>(typeof x==='string'?'':x.parent)===name);walk(children,d+1);});}
  walk(roots,depth);
  return opts;
}

function renderDeptList(){
  const el=document.getElementById('dept-list');if(!el)return;
  const names=getDeptNames();
  el.innerHTML=names.length?names.map((d,i)=>`<div class="master-item"><span>${esc(d)}</span><button class="btn btn-sm btn-danger" onclick="removeDeptSw(${i})">削除</button></div>`).join(''):'<p style="font-size:13px;color:#aaa;padding:8px">まだ登録されていません（ハードウェア管理の部署マスタと共用です）</p>';
}
function removeDeptSw(i){
  const names=getDeptNames();names.splice(i,1);
  // deptsからも削除
  depts=depts.filter((_,idx)=>idx!==i);
  renderDeptList();updateFilters();
}
function addDept(){
  const input=document.getElementById('dept-new');const val=input.value.trim();if(!val)return;
  // 文字列またはオブジェクト形式で追加
  if(depts.length>0&&typeof depts[0]==='object'){depts.push({name:val,parent:''});}
  else{depts.push(val);}
  input.value='';renderDeptList();updateFilters();
}
async function saveDepts(){
  showInd('saving','保存中...');
  try{const res=await gasPost('saveDepts',depts);if(res.error)throw new Error(res.error);showInd('saved','部署マスタ保存済み ✓（ハードウェア管理と共用）');updateFilters();}
  catch(e){showInd('error','保存エラー: '+e.message);}
}

// 起動
reloadAll();
